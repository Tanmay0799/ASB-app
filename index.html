<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry 🥺</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Canvas Confetti for celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Physics-based cubic-bezier transition so the jump looks smooth and intentional */
        .runaway-transition {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Floating background elements animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .heart-particle {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            animation: float 6s linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-50 via-red-50 to-amber-50 flex items-center justify-center min-h-screen p-4 font-sans select-none overflow-hidden antialiased">

    <!-- Background decorative floating elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0" id="hearts-bg"></div>

    <!-- Main Premium Card -->
    <div id="card" class="bg-white/80 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-[0_20px_50px_rgba(244,63,94,0.15)] text-center max-w-sm w-full border border-white relative z-10 transition-all duration-700">
        
        <!-- Interactive State Container -->
        <div id="interaction-container" class="space-y-6">
            <!-- Animated Icon Wrapper -->
            <div class="relative w-24 h-24 mx-auto flex items-center justify-center bg-rose-100 rounded-full animate-pulse">
                <span class="text-5xl">🥺</span>
                <span class="absolute -top-1 -right-1 text-2xl animate-bounce">❤️</span>
            </div>

            <!-- Copy Section (More emotional & sincere) -->
            <div class="space-y-3">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">I am really sorry...</h1>
                <p class="text-slate-600 text-base leading-relaxed px-1">
                    I hate knowing that I'm the reason that beautiful smile isn't on your face right now. I messed up, and I genuinely want to make things right. Maafi de do na? 🌹
                </p>
            </div>

            <!-- Button Wrapper Grid -->
            <div id="btn-wrapper" class="flex justify-center items-center gap-4 pt-6 min-h-[70px] relative">
                
                <button id="yes-btn" onclick="acceptSorry()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold px-6 py-3.5 rounded-full shadow-lg shadow-emerald-500/20 transform active:scale-95 transition-all cursor-pointer z-10">
                    I Forgive You ❤️
                </button>
                
                <!-- Keeps it in standard layout stream initially so it's perfectly visible -->
                <button id="no-btn" class="bg-gradient-to-r from-rose-500 to-red-500 text-white font-semibold px-6 py-3.5 rounded-full shadow-lg shadow-rose-500/20 cursor-pointer whitespace-nowrap z-20 runaway-transition">
                    No, I'm Mad ❌
                </button>
            </div>
        </div>

        <!-- Success Message Dashboard (Initially Hidden) -->
        <div id="success-message" class="hidden opacity-0 scale-90 transition-all duration-700 space-y-6 py-4">
            <div class="w-24 h-24 mx-auto flex items-center justify-center bg-emerald-100 rounded-full animate-bounce">
                <span class="text-5xl">🥰</span>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600">Thank You!</h2>
                <p class="text-slate-700 font-medium text-base">Best decision ever. Big treat and your favorite food on me tonight! 🥟✨</p>
            </div>
        </div>

    </div>

    <script>
        const noBtn = document.getElementById('no-btn');

        // Controlled jumping logic using CSS transforms to keep it strictly on-screen and visible
        function moveButton(e) {
            if (e) e.preventDefault(); // Essential to intercept physical clicks/taps on mobile

            // Define dynamic ranges for displacement (translating X and Y pixels)
            // This guarantees it skips away safely but stays completely within the visible card/center zone
            const directions = [-80, -50, 50, 80];
            const randomX = directions[Math.floor(Math.random() * directions.length)];
            const randomY = directions[Math.floor(Math.random() * directions.length)];

            // Apply transformation matrix instantly
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        // Event hooks to handle desktop hover AND mobile touchscreen taps perfectly
        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', moveButton);
        noBtn.addEventListener('click', moveButton); // Double layer safety net for mobile browser targets

        // Success State Handler
        function acceptSorry() {
            noBtn.remove(); // Drop escape option permanently
            
            const interactionContainer = document.getElementById('interaction-container');
            const successMessage = document.getElementById('success-message');
            const card = document.getElementById('card');

            // Hide initial interface and show success window
            interactionContainer.style.display = 'none';
            successMessage.classList.remove('hidden');
            
            setTimeout(() => {
                successMessage.classList.remove('opacity-0', 'scale-90');
                successMessage.classList.add('opacity-100', 'scale-100');
                card.classList.replace('shadow-[0_20px_50px_rgba(244,63,94,0.15)]', 'shadow-[0_20px_50px_rgba(16,185,129,0.15)]');
            }, 50);

            // Confetti Cannon Launch Parameters
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Ambient Floating Background System
        function createAmbientHearts() {
            const container = document.getElementById('hearts-bg');
            const icons = ['❤️', '✨', '🌸', '💖'];
            
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle text-lg';
                heart.innerText = icons[Math.floor(Math.random() * icons.length)];
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.animationDelay = `${Math.random() * 6}s`;
                heart.style.fontSize = `${Math.random() * (24 - 14) + 14}px`;
                container.appendChild(heart);
            }
        }
        createAmbientHearts();
    </script>
</body>
</html>
